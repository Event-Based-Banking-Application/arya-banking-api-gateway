server:
  port: 8085

app:
  config:
    keycloak:
      url: http://localhost:5433/
      realm: event-based-banking-application

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:

  config:
    import: 'optional:configserver:'

  cloud:
    config:
      uri: http://localhost:8090
      fail-fast: false

    gateway:
      routes:
        - id: user-service
          uri: lb://arya-banking-user-service
          predicates:
            - Path=/api/users/**,/api/security-details/**

        - id: auth-service-external
          uri: lb://arya-banking-auth-service
          predicates:
            - Path=/api/auth/**

        - id: auth-service-internal
          uri: lb://arya-banking-auth-service
          predicates:
            - Path=/internal/api/auth/**

        - id: admin-service
          uri: lb://arya-banking-admin-service
          predicates:
            - Path=/api/admin/**

        - id: admin-service-api-docs
          uri: lb://arya-banking-admin-service
          predicates:
            - Path=/admin-service/v3/api-docs
          filters:
            - RewritePath=/admin-service/v3/api-docs, /v3/api-docs

        - id: auth-service-api-docs
          uri: lb://arya-banking-auth-service
          predicates:
            - Path=/auth-service/v3/api-docs
          filters:
            - RewritePath=/auth-service/v3/api-docs, /v3/api-docs

        - id: user-service-api-docs
          uri: lb://arya-banking-user-service
          predicates:
            - Path=/user-service/v3/api-docs
          filters:
            - RewritePath=/user-service/v3/api-docs, /v3/api-docs

  application:
    name: arya-banking-api-gateway

  security:
    oauth2:
      client:
        provider:
          keycloak:
            token-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/token
            authorization-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/auth
            user-name-attribute: preferred_username
            user-info-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/userinfo
            jwk-set-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/certs
            user-info-authentication-method: header
        registration:
          banking-service-client:
            provider: keycloak
            client-id: banking-service-client
            client-secret: FMrBssX0Lk92Uwep4zQitLIRChUfffGs
            authorization-grant-type: authorization_code
            redirect-uri: ${app.config.keycloak.url}/login/oauth2/code/keycloak
            scope: openid

      resourceserver:
        jwt:
          jwk-set-uri: ${app.config.keycloak.url}realms/${app.config.keycloak.realm}/protocol/openid-connect/certs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Admin Service
        url: /admin-service/v3/api-docs
      - name: Auth Service
        url: /auth-service/v3/api-docs
      - name: User Service
        url: /user-service/v3/api-docs
